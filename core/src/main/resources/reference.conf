# Default configuration for exifutils
# These values are used if not overridden in user's application.conf

exifTool {
  # Path to the exiftool executable (empty means use PATH)
  path = ""
}

dateTime {
  # Default timezone for date/time operations when timezone is not available in metadata.
  # Format: IANA Time Zone Database (TZDB) identifier, e.g., "Europe/Paris", "America/New_York"
  # Reference: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  # If empty, system default timezone is used.
  timeZone = ""
}

rename {
  # Pattern for new file name, where following variables are available (extension is preserved):
  # ${prefix}: IMG for images, VID for video files
  # ${date}: pattern for formatting date of creation
  #          specs: https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/time/format/DateTimeFormatter.html
  pattern = "IMG_${date,yyyyMMdd}_${date,HHmmss}"
}

sort {
  # Default destination directory for sorted files.
  # If set, the -o/--outputDir option becomes optional.
  # Example: /home/user/Pictures/sorted
  destination = ""

  # Pattern for folder structure when sorting files by date.
  # Uses ${date,FORMAT} syntax with Java DateTimeFormatter patterns.
  # Specs: https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/time/format/DateTimeFormatter.html
  #
  # Examples:
  #   ${date,yyyy}/${date,MM}           -> 2024/07 (default: year/month)
  #   ${date,yyyy}/${date,MM}/${date,dd} -> 2024/07/15 (year/month/day)
  #   ${date,yyyy}/${date,ww}           -> 2024/28 (year/week of year)
  #   ${date,yyyy-MM}                   -> 2024-07 (flat year-month)
  pattern = "${date,yyyy}/${date,MM}"
}
