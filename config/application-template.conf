# exifutils configuration
# Only settings that differ from defaults need to be specified here.

exifTool {
  # Path to the exiftool executable
  path = ""
}

dateTime {
  # Default time zone for guessing date and time of creation if only local date is available.
  # Format: IANA Time Zone Database (TZDB) identifier, such as America/New_York
  # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  # If not set, system default time zone is used.
  #timeZone = ""
}

file {
  # Order in which input files are processed.
  # Valid values: name, last-modified, created
  # Default: name
  #sortOrder = "name"
}

sort {
  # Default destination directory for sorted files.
  # If set, the -o/--outputDir option becomes optional.
  # Example: /home/user/Pictures/sorted
  #destination = ""

  # Pattern for folder structure when sorting files by date.
  # Uses ${date,FORMAT} syntax with Java DateTimeFormatter patterns.
  # Examples:
  #   ${date,yyyy}/${date,MM}             -> 2024/07 (year/month, default)
  #   ${date,yyyy}/${date,MM}/${date,dd}  -> 2024/07/15 (year/month/day)
  #   ${date,yyyy}/${date,ww}             -> 2024/28 (year/week of year)
  #   ${date,yyyy-MM}                     -> 2024-07 (flat structure)
  #pattern = "${date,yyyy}/${date,MM}"
}
