name: Build Native Executable

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Native ${{ matrix.os-name }} Executable
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            artifact-name: exifutils-windows-native
            artifact-path: cli/target/exifutils.exe
          - os: ubuntu-latest
            os-name: Linux
            artifact-name: exifutils-linux-native
            artifact-path: cli/target/exifutils

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Setup MSVC (Visual C++ Build Tools)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven (Windows)
        if: matrix.os == 'windows-latest'
        run: mvn -Pnative -DskipTests package
        shell: cmd

      - name: Build with Maven (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: mvn -Pnative -DskipTests package

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 90
