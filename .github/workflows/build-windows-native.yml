name: Build Windows Native Executable

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Native Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'  # Adjust to your Java version (17, 21, etc.)
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Setup MSVC (Visual C++ Build Tools)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn -Pnative -DskipTests package
        shell: cmd

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: exifsort-windows-native
          path: D:\a\exifutils\exifutils\cli\target\exifutils.exe
          if-no-files-found: error
          retention-days: 90
